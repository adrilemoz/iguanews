name: CI — Build & APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-apk:
    name: Build Frontend + APK Android
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      # ── 3. Java 17 (necessário para o Gradle/Android) ────────
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Instalar dependências e build web ──────────────────
      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Build web (Vite)
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      # ── 5. Sincronizar dist/ com o projeto Android ───────────
      #    FIX: --no-open foi removido do @capacitor/cli ≥ 6.x
      - name: Capacitor sync
        working-directory: frontend
        run: npx cap sync android

      # ── 6. Permissão de execução para o Gradle wrapper ───────
      - name: Permissão gradlew
        working-directory: frontend/android
        run: chmod +x gradlew

      # ── 7. Build APK debug ────────────────────────────────────
      - name: Build APK debug
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      # ── 8. Upload APK como artefato ───────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iguanews-apk-${{ github.run_number }}
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
