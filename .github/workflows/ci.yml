name: CI — Build & APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Testes do backend
  # ────────────────────────────────────────────────────────────
  test-backend:
    name: Testes Backend
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      # ── 3. Instalar dependências ───────────────────────────
      - name: Instalar dependências do backend
        working-directory: backend
        run: npm ci

      # ── 4. Rodar testes ────────────────────────────────────
      #
      # CLOUDINARY_*: valores fictícios — testes não fazem upload real.
      # O env.js aceita qualquer string quando NODE_ENV=test (campo opcional).
      # Sem essas variáveis o Zod chamava process.exit(1) e derrubava
      # cada worker do Jest antes do teste começar (causa do erro anterior).
      #
      - name: Rodar testes
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MONGO_URI: ${{ secrets.MONGO_URI_TEST }}
          CLOUDINARY_CLOUD_NAME: test-placeholder
          CLOUDINARY_API_KEY: test-placeholder
          CLOUDINARY_API_SECRET: test-placeholder
        run: npm test

  # ────────────────────────────────────────────────────────────
  # Job 2: Build do frontend + APK Android
  # ────────────────────────────────────────────────────────────
  build-apk:
    name: Build Frontend + APK Android
    runs-on: ubuntu-latest
    needs: test-backend          # só roda se os testes passarem

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      # ── 3. Java 17 (necessário para o Gradle/Android) ──────
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Instalar dependências e build web ────────────────
      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Build web (Vite)
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      # ── 5. Adicionar plataforma Android ────────────────────
      #    A pasta android/ está no .gitignore e não existe no
      #    runner — precisa ser gerada antes do sync.
      - name: Adicionar plataforma Android
        working-directory: frontend
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # ── 6. Sincronizar dist/ com o projeto Android ─────────
      - name: Capacitor sync
        working-directory: frontend
        run: npx cap sync android

      # ── 7. Permissão de execução para o Gradle wrapper ─────
      - name: Permissão gradlew
        working-directory: frontend/android
        run: chmod +x gradlew

      # ── 8. Build APK debug ──────────────────────────────────
      - name: Build APK debug
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      # ── 9. Upload APK como artefato ─────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iguanews-apk-${{ github.run_number }}
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
